name: Android Release AAB

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-aab:
    name: Build signed release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Generate release version
        run: |
          version_code="${GITHUB_RUN_NUMBER}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version_name="${GITHUB_REF_NAME#v}"
          else
            version_name="1.0.${GITHUB_RUN_NUMBER}"
          fi

          if ! [[ "$version_code" =~ ^[0-9]+$ ]]; then
            echo "::error::VERSION_CODE must be a positive integer"
            exit 1
          fi

          echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "AAB_FILE_NAME=app-release-v${version_name}-code${version_code}.aab" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name GitHub secret is required for release signing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/lockify-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "KEYSTORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release AAB
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean :app:bundleRelease

      - name: Rename signed AAB
        run: |
          mkdir -p release
          cp app/build/outputs/bundle/release/app-release.aab "release/${AAB_FILE_NAME}"

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lockify-signed-release-aab
          path: release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*.aab
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary keystore
        if: always()
        run: |
          if [ -n "$KEYSTORE_FILE" ] && [ -f "$KEYSTORE_FILE" ]; then
            shred -u "$KEYSTORE_FILE" || rm -f "$KEYSTORE_FILE"
          fi
